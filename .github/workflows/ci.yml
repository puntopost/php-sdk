name: CI

on: pull_request

jobs:
  analysis:
    name: Code style + Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          extensions: curl, json
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run ECS
        run: vendor/bin/ecs check --no-progress-bar
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration phpstan.neon --no-progress --memory-limit=512M

  version-check:
    name: PHP ${{ matrix.php-version }} linter + tests
    runs-on: ubuntu-latest
    needs: analysis
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "7.4"
          - "8.5"
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run linter
        run: find src tests -name "*.php" | sort | xargs -I{} php -l {}
      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist
